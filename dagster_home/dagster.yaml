run_storage:
  module: dagster_postgres.run_storage
  class: PostgresRunStorage
  config:
    postgres_db:
      username:
        env: PGUSER
      password:
        env: PGPASS
      hostname:
        env: PGHOST
      port:
        env: PGPORT
      db_name:
        env: PGDB
      params:
        options: "-c search_path=dagster"

event_log_storage:
  module: dagster_postgres.event_log
  class: PostgresEventLogStorage
  config:
    postgres_db:
      username:
        env: PGUSER
      password:
        env: PGPASS
      hostname:
        env: PGHOST
      port:
        env: PGPORT
      db_name:
        env: PGDB
      params:
        options: "-c search_path=dagster"

schedule_storage:
  module: dagster_postgres.schedule_storage
  class: PostgresScheduleStorage
  config:
    postgres_db:
      username:
        env: PGUSER
      password:
        env: PGPASS
      hostname:
        env: PGHOST
      port:
        env: PGPORT
      db_name:
        env: PGDB
      params:
        options: "-c search_path=dagster"
